name: github-metrics

on:
  workflow_dispatch:
  schedule: [{cron: "0 0 * * *"}]

jobs:
  job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_isocalendar: yes
